<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f8fb;
            margin: 0;
            padding: 0;
        }

        .header{
            background-color: #0077b6;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .contact-card{
            width: 60%;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .form-container{
            width: 60%;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        label{
            font-weight: bold;
        }

        input, textarea{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background-color: #005f8f;
        }

        footer{
            background-color: #0077b6;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Contact Us</h1>
        <p>We are here to help you</p>
    </div>

    <div class="contact-card">
        <h2>Contact Information</h2>
        <p><strong>Phone:</strong> +1 (800) 000-0000</p>
        <p><strong>Email:</strong> info@hospital.com</p>
        <p><strong>Address:</strong> Main Medical Center</p>
    </div>

    <div class="form-container">
        <h2>Send Us a Message</h2>

        <form>
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number">

            <label>Message</label>
            <textarea rows="5" placeholder="Type your message here"></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Cleveland Clinic Clone Website</p>
    </footer>

</body>
</html>
